name: CI - Build, Push & Smoke H-Beam Quote Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # 用 owner / 而非 owner/repo/component(學員好記)
  # 例:cshliu77 + h-beam-quote → ghcr.io/cshliu77/h-beam-quote
  IMAGE_NAME: ${{ github.repository_owner }}/h-beam-quote

jobs:
  # ─────────────────────────────────────────────────────────
  # Build + Push to GHCR
  # ─────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────
  # Smoke test — 防止壞 image 被打 latest 標籤,炸了所有 Lab 學員
  # ─────────────────────────────────────────────────────────
  smoke-test:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: sha
        env:
          SHA: ${{ github.sha }}
        run: |
          short=$(echo "$SHA" | cut -c1-7)
          echo "tag=sha-${short}" >> "$GITHUB_OUTPUT"

      - name: Pull image just built
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.tag }}
        run: docker pull "$IMAGE"

      - name: Start container
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.tag }}
        run: |
          docker run -d --name h-beam-quote -p 8080:8080 "$IMAGE"

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/api/health > /dev/null; then
              echo "✓ /api/health is up"
              curl -s http://localhost:8080/api/health
              exit 0
            fi
            echo "Waiting... ($i/20)"
            sleep 2
          done
          echo "Health check failed"
          docker logs h-beam-quote
          exit 1

      - name: Smoke API — list products
        run: |
          curl -sf http://localhost:8080/api/products | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['count'] >= 10, f'Expected >=10 products, got {d[\"count\"]}'
          print(f'OK {d[\"count\"]} products seeded')
          "

      - name: Smoke API — calculate quote
        run: |
          curl -sf -X POST http://localhost:8080/api/quotes \
            -H "Content-Type: application/json" \
            -d '{"items":[{"product_code":"HW300x300","grade":"SS400","length_m":6,"quantity":20}]}' \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['final_total_ntd'] == 321480, f'Expected 321480, got {d[\"final_total_ntd\"]}'
          print(f'OK HW300x300x20 = NT${d[\"final_total_ntd\"]:,}')
          "

      - name: Cleanup
        if: always()
        run: docker rm -f h-beam-quote || true
